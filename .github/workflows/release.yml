name: Release or full dry run

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Intended release tag (vX.Y.Z); must match Cargo.toml
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  RUST_VERSION: 1.96.0
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  verify:
    name: Verify release source
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vX.Y.Z format, for example v1.2.3." >&2
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify Cargo version matches tag
        shell: bash
        run: |
          expected_version="${RELEASE_TAG#v}"
          cargo_version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          if [[ "$cargo_version" != "$expected_version" ]]; then
            echo "Tag and Cargo.toml versions differ: $RELEASE_TAG vs $cargo_version" >&2
            exit 1
          fi
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
      - name: Audit locked dependencies
        run: |
          cargo install cargo-audit --locked --version 0.22.2
          # quick-xml is reachable only through disabled Linux window-system backends.
          cargo audit --target-os macos --target-os windows --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run tests
        run: cargo test --workspace --all-targets --locked
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  macos:
    name: macOS ${{ matrix.arch }} signed build
    needs: verify
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 150
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
          targets: ${{ matrix.target }}
      - name: Run target Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked --target "${{ matrix.target }}" -- -D warnings
      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD MACOS_KEYCHAIN_PASSWORD; do
            if [[ -z "${!name}" ]]; then echo "Missing signing secret: $name" >&2; exit 1; fi
          done
          certificate="$RUNNER_TEMP/developer-id.p12"
          keychain="$RUNNER_TEMP/hasher-signing.keychain-db"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode >"$certificate"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain"
          security import "$certificate" -P "$MACOS_CERTIFICATE_PASSWORD" -t cert -f pkcs12 -k "$keychain" -A -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain"
          security default-keychain -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$keychain"
          security find-identity -v -p codesigning "$keychain"
      - name: Probe Developer ID timestamp signing
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          if [[ "$CODESIGN_IDENTITY" != Developer\ ID\ Application:* ]]; then
            echo "MACOS_CODESIGN_IDENTITY must identify a Developer ID Application certificate." >&2
            exit 1
          fi
          printf 'int main(void){return 0;}\n' >"$RUNNER_TEMP/signing-probe.c"
          clang "$RUNNER_TEMP/signing-probe.c" -o "$RUNNER_TEMP/signing-probe"
          perl -e 'alarm shift @ARGV; exec @ARGV or die "exec failed: $!\n"' 180 codesign --force --options runtime --timestamp --verbose=4 --sign "$CODESIGN_IDENTITY" "$RUNNER_TEMP/signing-probe"
          codesign --verify --strict --verbose=4 "$RUNNER_TEMP/signing-probe"
      - name: Build, sign and notarize macOS artifacts
        env:
          TARGET: ${{ matrix.target }}
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          NOTARIZE: "1"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: packaging/macos/build.sh
      - name: Verify signed artifacts
        run: |
          codesign --verify --deep --strict --verbose=4 dist/macos/Hasher.app
          xcrun stapler validate dist/macos/Hasher.app
          xcrun stapler validate "dist/macos/Hasher-${RELEASE_TAG#v}-macOS-${{ matrix.arch }}.dmg"
          hdiutil verify "dist/macos/Hasher-${RELEASE_TAG#v}-macOS-${{ matrix.arch }}.dmg"
      - name: Clean up signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/hasher-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/developer-id.p12"
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Hasher-macOS-${{ matrix.arch }}
          path: |
            dist/macos/Hasher-*-macOS-${{ matrix.arch }}.zip
            dist/macos/Hasher-*-macOS-${{ matrix.arch }}-portable.zip
            dist/macos/Hasher-*-macOS-${{ matrix.arch }}.dmg
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows installer and portable builds
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 90
    environment: release-signing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
          targets: x86_64-pc-windows-msvc
      - name: Run Windows Clippy
        shell: pwsh
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Build Windows artifacts
        shell: pwsh
        env:
          HASHER_SIGNTOOL_COMMAND: ${{ secrets.HASHER_SIGNTOOL_COMMAND }}
        run: ./packaging/windows/build.ps1
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Hasher-Windows-x64
          path: |
            dist/windows/Hasher-*-windows-offline-portable.zip
            dist/windows/Hasher-*-setup.exe
          if-no-files-found: error
          retention-days: 14

  windows-defender-scan:
    name: Microsoft Defender release scan
    needs: windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Download Windows release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Hasher-Windows-x64
          path: defender-input
      - name: Verify Defender and update signatures
        shell: pwsh
        run: |
          $status = Get-MpComputerStatus -ErrorAction Stop
          $status | Select-Object AMRunningMode,AMServiceEnabled,AntivirusEnabled,RealTimeProtectionEnabled,AMEngineVersion,AntivirusSignatureVersion,AntivirusSignatureLastUpdated | Format-List
          if (-not $status.AMServiceEnabled) { throw "Microsoft Defender antimalware service is disabled." }
          if (-not $status.AntivirusEnabled) { throw "Microsoft Defender Antivirus is disabled." }
          if ($status.AMRunningMode -ne "Normal") { throw "Microsoft Defender is not active: $($status.AMRunningMode)" }
          $existing = @(Get-MpThreatDetection -ErrorAction Stop)
          if ($existing.Count -gt 0) { $existing | Format-List; throw "Fresh runner already reports a Defender detection." }
          Update-MpSignature -ErrorAction Stop
      - name: Expand and scan all Windows release content
        shell: pwsh
        run: |
          $scanRoot = Join-Path $PWD "defender-scan"
          $expanded = Join-Path $scanRoot "expanded"
          New-Item -ItemType Directory -Path $expanded -Force | Out-Null
          Copy-Item defender-input\* $scanRoot
          $zips = @(Get-ChildItem defender-input\*.zip)
          $exes = @(Get-ChildItem defender-input\*.exe)
          if ($zips.Count -lt 1) { throw "Expected at least one Windows ZIP artifact, found $($zips.Count)." }
          if ($exes.Count -lt 1) { throw "Expected at least one Windows EXE artifact, found $($exes.Count)." }
          foreach ($zip in $zips) {
            Expand-Archive -Path $zip.FullName -DestinationPath (Join-Path $expanded $zip.BaseName) -Force
          }
          Start-MpScan -ScanType CustomScan -ScanPath $scanRoot -ErrorAction Stop
          $detections = @(Get-MpThreatDetection -ErrorAction Stop)
          if ($detections.Count -gt 0) { $detections | Format-List; throw "Defender detected malware in release artifacts." }
          $status = Get-MpComputerStatus -ErrorAction Stop
          @(
            "Microsoft Defender release scan: no detections",
            "Scan time (UTC): $([DateTime]::UtcNow.ToString('O'))",
            "Engine version: $($status.AMEngineVersion)",
            "Signature version: $($status.AntivirusSignatureVersion)",
            "Signatures updated: $($status.AntivirusSignatureLastUpdated)",
            "",
            "SHA-256 Windows artifact hashes:"
          ) | Set-Content defender-scan-report.txt -Encoding UTF8
          Get-FileHash -Algorithm SHA256 defender-input\* | Sort-Object Path | ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } | Add-Content defender-scan-report.txt -Encoding UTF8
          Get-Content defender-scan-report.txt
      - name: Upload Defender report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Hasher-Windows-Defender-report
          path: defender-scan-report.txt
          if-no-files-found: error
          retention-days: 14

  bundle:
    name: Changelog and release bundle
    needs: [macos, windows, windows-defender-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout complete tag history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Materialize intended tag for dry run
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git rev-parse --verify --quiet "$RELEASE_TAG^{commit}" >/dev/null; then
            [[ "$(git rev-list -n 1 "$RELEASE_TAG")" == "$GITHUB_SHA" ]] || { echo "Existing tag $RELEASE_TAG does not point at this commit." >&2; exit 1; }
          else
            git tag "$RELEASE_TAG" HEAD
          fi
      - name: Download build and scan artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: Hasher-*
          path: release-assets
          merge-multiple: true
      - name: Verify expected bundle
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          expected=(
            "Hasher-${version}-macOS-arm64.zip"
            "Hasher-${version}-macOS-arm64-portable.zip"
            "Hasher-${version}-macOS-arm64.dmg"
            "Hasher-${version}-windows-offline-portable.zip"
            "Hasher-${version}-setup.exe"
            "defender-scan-report.txt"
          )
          for asset in "${expected[@]}"; do
            [[ -f "release-assets/$asset" ]] || { echo "Missing release artifact: $asset" >&2; exit 1; }
          done
      - name: Generate tag-to-tag changelog
        run: |
          scripts/generate-release-notes.sh release-notes.md "$RELEASE_TAG"
      - name: Upload complete release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Hasher-release-bundle
          path: |
            release-assets/*
            release-notes.md
          if-no-files-found: error
          retention-days: 14

  attest:
    name: GitHub provenance attestations
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download complete release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Hasher-release-bundle
          path: bundle
      - name: Attest every release asset
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: bundle/release-assets/*

  release:
    name: Publish GitHub release
    needs: attest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download attested release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Hasher-release-bundle
          path: bundle
      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: Hasher ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: bundle/release-notes.md
          fail_on_unmatched_files: true
          files: bundle/release-assets/*

  dry-run-summary:
    name: Full dry run complete (no release published)
    needs: attest
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download attested dry-run bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Hasher-release-bundle
          path: bundle
      - name: Preview release
        working-directory: bundle/release-assets
        run: |
          printf '\nDry run completed every build, signing, notarization, Defender scan, changelog and attestation stage. No GitHub release was created.\n'
      - name: Upload dry-run preview
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Hasher-${{ inputs.release_tag }}-dry-run-preview
          path: bundle/*
          if-no-files-found: error
          retention-days: 14
