name: Security audit

on:
  push:
    branches: [main]
    paths: ["**/Cargo.toml", "Cargo.lock", ".github/workflows/security-audit.yml"]
  pull_request:
    paths: ["**/Cargo.toml", "Cargo.lock", ".github/workflows/security-audit.yml"]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rustsec:
    name: RustSec advisory scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2
      - name: Audit Cargo.lock
        # quick-xml is reachable only through disabled Linux window-system backends.
        run: cargo audit --target-os macos --target-os windows --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
